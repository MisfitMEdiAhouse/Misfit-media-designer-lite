<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breezy Service | Free Quote</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1e2d;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
    }

    h1 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #cfd8dc;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #2bb3ff;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      color: #000;
    }

    .consent {
      font-size: 13px;
      color: #cfd8dc;
      margin: 12px 0;
      line-height: 1.5;
    }

    .footer {
      margin-top: 30px;
      font-size: 13px;
      text-align: center;
      color: #90a4ae;
    }

    .footer a {
      color: #2bb3ff;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Breezy Service</h1>
    <p>Request a Free Quote for Whole Home Fans & Attic Ventilation</p>

    <form>
      <input type="text" placeholder="Full Name" required />
      <input type="email" placeholder="Email Address" required />
      <input type="tel" placeholder="Phone Number" required />

      <div class="consent">
        <label>
          <input type="checkbox" required />
          I agree to receive SMS messages from Breezy Service related to my inquiry,
          appointment scheduling, estimates, service updates, and follow-up communication.
          Message frequency varies. Message and data rates may apply.
          Reply STOP to opt out and HELP for help. Consent is not a condition of purchase.
        </label>
      </div>

      <button type="submit">Request Free Quote</button>
    </form>

    <div class="footer">
      <p>
        Breezy Service | Utah Home Ventilation Experts<br/>
        <a href="https://misfitmediahouse.com/privacy-policy.html">Privacy Policy</a> |
        <a href="https://misfitmediahouse.com/terms.html">Terms</a>
      </p>
      <p>Email: info@breezyservice.com | Phone: (801) 441-4326</p>
    </div>

  </div>
</body>
</html>
