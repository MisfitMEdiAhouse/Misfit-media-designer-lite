<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misfit AI</title>
  <meta
    name="description"
    content="Misfit AI is autonomous revenue software for operators who want faster follow-up, revived leads, and cleaner execution."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050505;
      --panel: #0d0d0d;
      --line: rgba(255,255,255,0.08);
      --text: #f5f5f5;
      --muted: #aaaaaa;
      --accent: #20d7c7;
      --accent-dark: #17b8aa;
      --danger: #ff3b3b;
      --shadow: rgba(32, 215, 199, 0.18);
      --max: 430px;
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at top center, rgba(32,215,199,0.08), transparent 30%),
        linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
      color: var(--text);
      font-family: "Inter", Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 20px 14px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: 100%;
      max-width: var(--max);
      min-height: calc(100dvh - 40px);
      background: linear-gradient(180deg, rgba(13,13,13,0.98), rgba(8,8,8,0.99));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px 18px 20px;
      display: flex;
      flex-direction: column;
      box-shadow:
        0 10px 40px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .header img {
      width: 42px;
      height: 42px;
      object-fit: cover;
      border-radius: 12px;
    }

    .brand {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.07em;
      text-transform: lowercase;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .logo {
      width: min(78vw, 250px);
      margin: 6px auto 24px;
      filter: drop-shadow(0 0 22px rgba(32,215,199,0.05));
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(32,215,199,0.22);
      color: var(--accent);
      background: rgba(32,215,199,0.06);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(2.5rem, 10vw, 4.4rem);
      line-height: 0.94;
      letter-spacing: -0.08em;
      font-weight: 900;
      max-width: 360px;
      margin: 0 auto 18px;
    }

    .accent {
      color: var(--accent);
    }

    .subhead {
      max-width: 330px;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.65;
      font-weight: 500;
      margin: 0 auto 28px;
    }

    .cta {
      width: 100%;
      max-width: 360px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 18px 20px;
      border-radius: 20px;
      background: linear-gradient(90deg, var(--accent-dark) 0%, #2ad3e2 100%);
      color: #fff;
      font-size: 1.08rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      box-shadow: 0 0 26px var(--shadow);
      transition: transform 0.14s ease, opacity 0.14s ease;
    }

    .cta:hover,
    .cta:active {
      transform: translateY(-1px);
      opacity: 0.98;
    }

    .signin {
      margin-top: 16px;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .signin a {
      color: var(--text);
      font-weight: 700;
    }

    .signin a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.36);
    }

    @media (max-height: 760px) {
      .shell {
        min-height: auto;
      }

      .logo {
        width: min(62vw, 190px);
        margin-bottom: 18px;
      }

      h1 {
        font-size: clamp(2.1rem, 8.7vw, 3.4rem);
      }

      .subhead {
        font-size: 0.96rem;
        margin-bottom: 22px;
      }

      .cta {
        padding: 16px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <img src="neon-skull-rose.png" alt="Misfit AI logo">
      <div class="brand">misfit ai</div>
    </header>

    <section class="main">
      <div class="eyebrow">Autonomous Revenue Software</div>

      <img src="neon-skull-rose.png" alt="Misfit AI skull logo" class="logo">

      <h1>
        Move Faster.<br>
        <span class="accent">Close More.</span>
      </h1>

      <p class="subhead">
        Misfit AI helps operators revive dead leads, automate follow-up, and keep revenue moving without living inside a bloated CRM.
      </p>

      <a href="https://misfit-ai-v2.base44.app/Pricing" class="cta">
        Launch My AI Empire
      </a>

      <div class="signin">
        Already have an account?
        <a href="https://misfit-ai-v2.base44.app">Sign in</a>
      </div>
    </section>

    <footer class="footer">
      © Misfit Mediahouse
    </footer>
  </main>
</body>
</html>
