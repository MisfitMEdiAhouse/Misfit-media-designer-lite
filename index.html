<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misfit AI</title>
  <meta
    name="description"
    content="Misfit AI is an autonomous revenue operating system for operators who want faster follow-up, smarter automation, and cleaner execution."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #070909;
      --panel: #0f1313;
      --line: rgba(255,255,255,0.08);
      --text: #f3f5f7;
      --muted: #9aa3a8;
      --accent: #21d7c3;
      --accent-2: #18bfae;
      --shadow: rgba(33, 215, 195, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Inter", Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(33,215,195,0.08), transparent 32%),
        linear-gradient(180deg, #0a0d0d 0%, #060707 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .frame {
      width: 100%;
      max-width: 430px;
      min-height: calc(100dvh - 36px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(15,19,19,0.96) 0%, rgba(10,12,12,0.98) 100%);
      box-shadow:
        0 10px 40px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.03);
      padding: 22px 20px 24px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .header-mark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.08);
      background: #000;
    }

    .header-name {
      font-size: 1.85rem;
      font-weight: 900;
      letter-spacing: -0.06em;
      text-transform: lowercase;
    }

    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex: 1;
      gap: 18px;
      padding: 12px 0;
    }

    .logo {
      width: min(68vw, 220px);
      aspect-ratio: 1 / 1;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(33,215,195,0.06));
    }

    h1 {
      font-size: clamp(2.3rem, 8.5vw, 3.4rem);
      line-height: 0.95;
      letter-spacing: -0.07em;
      font-weight: 900;
      max-width: 360px;
    }

    .accent {
      color: var(--accent);
    }

    .subhead {
      max-width: 340px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
      font-weight: 500;
    }

    .cta-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
    }

    .cta {
      width: 100%;
      max-width: 360px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 18px 22px;
      border-radius: 18px;
      background: linear-gradient(90deg, var(--accent-2) 0%, #2ad3e2 100%);
      color: #ffffff;
      font-size: 1.08rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      box-shadow: 0 0 24px var(--shadow);
      transition: transform 0.14s ease, opacity 0.14s ease;
    }

    .cta:hover,
    .cta:active {
      transform: translateY(-1px);
      opacity: 0.98;
    }

    .account-link {
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .account-link a {
      color: var(--text);
      font-weight: 600;
    }

    .account-link a:hover {
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      color: rgba(255,255,255,0.38);
      font-size: 0.76rem;
      letter-spacing: 0.02em;
    }

    @media (max-height: 760px) {
      .frame {
        padding-top: 18px;
        padding-bottom: 18px;
      }

      .main {
        gap: 14px;
      }

      .logo {
        width: min(54vw, 170px);
      }

      h1 {
        font-size: clamp(2rem, 7.8vw, 2.8rem);
        max-width: 330px;
      }

      .subhead {
        font-size: 0.95rem;
        line-height: 1.55;
      }

      .cta {
        padding: 16px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <main class="frame">
      <header class="header">
        <img src="neon-skull-rose.png" alt="Misfit AI logo" class="header-mark" />
        <div class="header-name">misfit ai</div>
      </header>

      <section class="main">
        <img src="neon-skull-rose.png" alt="Misfit AI skull logo" class="logo" />

        <h1>
          Launch Your <span class="accent">AI Empire</span>
        </h1>

        <p class="subhead">
          Autonomous revenue software for operators who want faster follow-up, revived leads, and cleaner execution.
        </p>

        <div class="cta-wrap">
          <a href="https://misfit-ai-v2.base44.app/Pricing" class="cta">
            Launch My AI Empire
          </a>

          <div class="account-link">
            Already have an account?
            <a href="https://misfit-ai-v2.base44.app">Sign in</a>
          </div>
        </div>
      </section>

      <div class="footer">
        © Misfit Mediahouse
      </div>
    </main>
  </div>
</body>
</html>
