<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>misfit ai</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      text-align: center;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    .skull-wrap {
      margin-bottom: 30px;
    }

    .skull-wrap img {
      width: 220px;
      height: auto;
      border-radius: 16px;
      display: block;
      margin: 0 auto;
      background: transparent;
    }

    .headline {
      font-size: 36px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .headline span {
      display: block;
      color: #00cfff; /* neon skull blue */
      text-shadow:
        0 0 8px rgba(0, 207, 255, 0.6),
        0 0 16px rgba(0, 207, 255, 0.3);
    }

    .subhead {
      font-size: 16px;
      color: #aaa;
      line-height: 1.5;
      margin-bottom: 24px;
      padding: 0 10px;
    }

    .features {
      font-size: 14px;
      color: #00cfff;
      margin-bottom: 28px;
      opacity: 0.9;
    }

    .cta {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      color: #000;

      background: linear-gradient(135deg, #ffd700, #ffb300); /* gold tooth */
      box-shadow:
        0 0 12px rgba(255, 215, 0, 0.6),
        0 0 24px rgba(255, 179, 0, 0.3);

      transition: 0.2s ease;
      margin-bottom: 16px;
    }

    .cta:hover {
      transform: scale(1.03);
      box-shadow:
        0 0 16px rgba(255, 215, 0, 0.9),
        0 0 32px rgba(255, 179, 0, 0.5);
    }

    .signin {
      font-size: 14px;
      color: #888;
    }

    .signin a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #555;
    }

    @media (max-height: 700px) {
      .headline {
        font-size: 30px;
      }

      .skull-wrap img {
        width: 180px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="logo-text">misfit ai</div>

    <div class="skull-wrap">
      <img src="YOUR_SKULL_IMAGE_URL_HERE" alt="misfit skull logo" />
    </div>

    <div class="headline">
      Autonomous
      <span>Revenue Engine</span>
    </div>

    <div class="subhead">
      AI that follows up, books appointments, and keeps revenue moving automatically.
    </div>

    <div class="features">
      AI Twin • Lead Revival Engine • Affiliate Engine
    </div>

    <a class="cta" href="https://misfit-ai-v2.base44.app/Pricing">
      Launch My AI Revenue Empire
    </a>

    <div class="signin">
      Already have an account? <a href="#">Sign in</a>
    </div>

    <div class="footer">
      © Misfit Mediahouse
    </div>

  </div>
</body>
</html>
