<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>misfit ai</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    :root {
      --bg: #000000;
      --white: #f5f5f5;
      --muted: #8e8e93;
      --skull-blue: #18c8ff;
      --gold: #d4a017;
      --gold-dark: #b8860b;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--white);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      padding: 28px 22px 24px;
    }

    .brand {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 22px;
      text-transform: lowercase;
    }

    .logo-wrap {
      margin: 0 auto 26px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .logo {
      width: 230px;
      max-width: 72vw;
      height: auto;
      display: block;
      background: transparent;
    }

    .headline {
      font-size: clamp(2.8rem, 10vw, 4.2rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.05em;
      margin-bottom: 22px;
    }

    .headline .line-1 {
      display: block;
      color: var(--white);
    }

    .headline .line-2 {
      display: block;
      color: var(--skull-blue);
      text-shadow:
        0 0 6px rgba(24, 200, 255, 0.35),
        0 0 14px rgba(24, 200, 255, 0.18);
    }

    .subhead {
      font-size: 17px;
      line-height: 1.55;
      color: #a8a8ad;
      margin: 0 auto 18px;
      max-width: 360px;
    }

    .engines {
      font-size: 14px;
      line-height: 1.5;
      color: var(--skull-blue);
      font-weight: 700;
      margin-bottom: 28px;
    }

    .cta {
      display: block;
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 18px 24px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 800;
      color: #000;
      background: linear-gradient(180deg, #e0b32d 0%, #c99712 100%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 8px 30px rgba(212, 160, 23, 0.28);
      margin-bottom: 18px;
    }

    .cta:active,
    .cta:hover {
      background: linear-gradient(180deg, #e5ba38 0%, #b8860b 100%);
    }

    .signin {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .signin a {
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
    }

    .footer {
      font-size: 12px;
      color: #5f5f63;
    }

    @media (max-height: 760px) {
      .wrap {
        padding-top: 20px;
        padding-bottom: 18px;
      }

      .logo {
        width: 200px;
      }

      .headline {
        font-size: clamp(2.4rem, 9vw, 3.4rem);
      }

      .subhead {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand">misfit ai</div>

    <div class="logo-wrap">
      <img src="neon-skull-rose.png" alt="misfit skull logo" class="logo" />
    </div>

    <h1 class="headline">
      <span class="line-1">Autonomous</span>
      <span class="line-2">Revenue Engine</span>
    </h1>

    <p class="subhead">
      From digital business card to enterprise SaaS, Misfit AI runs follow-up, books appointments, and keeps revenue moving automatically.
    </p>

    <div class="engines">
      AI Twin • Lead Revival Engine • Affiliate Engine
    </div>

    <a href="https://misfit-ai-v2.base44.app/Pricing" class="cta">
      Launch My AI Empire
    </a>

    <div class="signin">
      Already have an account? <a href="https://misfit-ai-v2.base44.app">Sign in</a>
    </div>

    <div class="footer">© Misfit Mediahouse</div>
  </main>
</body>
</html>
