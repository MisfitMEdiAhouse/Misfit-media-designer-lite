<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Misfit AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #050505;
  --text: #f5f5f5;
  --muted: #9c9c9c;
  --accent: #22d7c8;
  --accent2: #39d7e2;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Inter", sans-serif;
  display: flex;
  justify-content: center;
  padding: 20px 14px;
}

.page {
  width: 100%;
  max-width: 420px;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.brand {
  text-align: center;
  font-weight: 900;
  font-size: 1.9rem;
  letter-spacing: -0.06em;
  margin-bottom: 20px;
  text-transform: lowercase;
}

.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* CLEAN LOGO (NO GLOW, NO BLEND HACKS) */
.logo-wrap {
  width: min(60vw, 200px);
  aspect-ratio: 1/1;
  margin-bottom: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* this lets you swap transparent logo later instantly */
.logo {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* HEADLINE */
h1 {
  font-size: clamp(2.6rem, 9vw, 3.8rem);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -0.08em;
  margin-bottom: 14px;
}

.line {
  display: block;
}

.accent {
  color: var(--accent);
}

/* SUBHEAD */
.subhead {
  max-width: 330px;
  color: var(--muted);
  font-size: 1rem;
  line-height: 1.6;
  margin-bottom: 18px;
}

/* ENGINE LINE */
.engine-line {
  font-size: 0.9rem;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 28px;
}

/* CTA */
.cta {
  width: 100%;
  max-width: 360px;
  padding: 18px;
  border-radius: 16px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  color: #041010;
  font-weight: 900;
  font-size: 1.05rem;
  text-align: center;
  text-decoration: none;
}

/* SIGN IN */
.signin {
  margin-top: 16px;
  font-size: 0.9rem;
  color: var(--muted);
}

.signin a {
  color: var(--text);
  font-weight: 700;
  text-decoration: none;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.35);
  margin-top: 20px;
}

</style>
</head>

<body>
<main class="page">

  <div class="brand">misfit ai</div>

  <section class="hero">

    <!-- LOGO -->
    <div class="logo-wrap">
      <img src="neon-skull-rose.png" class="logo" />
    </div>

    <!-- HEADLINE -->
    <h1>
      <span class="line">Autonomous</span>
      <span class="line accent">Revenue Engine</span>
    </h1>

    <!-- COPY (FIXED) -->
    <p class="subhead">
      From digital business card to enterprise SaaS, Misfit AI runs follow-up, books appointments, and keeps revenue moving automatically.
    </p>

    <!-- FEATURES -->
    <div class="engine-line">
      AI Twin · Lead Revival Engine · Affiliate Engine
    </div>

    <!-- CTA -->
    <a href="https://misfit-ai-v2.base44.app/Pricing" class="cta">
      Launch My AI Empire
    </a>

    <!-- SIGN IN -->
    <div class="signin">
      Already have an account?
      <a href="https://misfit-ai-v2.base44.app">Sign in</a>
    </div>

  </section>

  <div class="footer">
    © Misfit Mediahouse
  </div>

</main>
</body>
</html>
