<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misfit AI</title>
  <meta
    name="description"
    content="Misfit AI is an autonomous revenue engine that runs follow-up, books appointments, and keeps revenue moving."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #050505;
      --panel: #0c0c0c;
      --text: #f4f4f4;
      --muted: #a3a3a3;
      --accent: #27d7cf;
      --accent-2: #47d4f0;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      background: #000;
    }

    body {
      font-family: "Inter", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(39,215,207,0.08), transparent 35%),
        linear-gradient(180deg, #040404 0%, #000000 100%);
      display: flex;
      justify-content: center;
      padding: 20px 14px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: 100%;
      max-width: 430px;
      min-height: calc(100dvh - 40px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel {
      width: 100%;
      background: linear-gradient(180deg, rgba(12,12,12,0.96) 0%, rgba(7,7,7,0.98) 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 26px 22px 24px;
      text-align: center;
    }

    .brand {
      font-size: clamp(2rem, 8vw, 2.7rem);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.08em;
      text-transform: lowercase;
      margin-bottom: 22px;
    }

    .logo-wrap {
      width: min(54vw, 190px);
      margin: 0 auto 22px;
    }

    .logo {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    .headline {
      margin-bottom: 16px;
      font-weight: 900;
      letter-spacing: -0.08em;
      line-height: 0.92;
      font-size: clamp(2.6rem, 11vw, 4.3rem);
    }

    .headline .line {
      display: block;
    }

    .headline .accent {
      color: var(--accent);
    }

    .subhead {
      max-width: 330px;
      margin: 0 auto 18px;
      color: var(--muted);
      font-size: 1.06rem;
      line-height: 1.65;
      font-weight: 500;
    }

    .engines {
      margin: 0 auto 26px;
      color: var(--accent);
      font-size: 0.95rem;
      line-height: 1.5;
      font-weight: 700;
    }

    .cta {
      display: block;
      width: 100%;
      padding: 20px 18px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #041313;
      font-size: 1.12rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      box-shadow: 0 14px 40px rgba(39,215,207,0.26);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .cta:hover,
    .cta:active {
      transform: translateY(-1px);
      box-shadow: 0 18px 46px rgba(39,215,207,0.30);
      opacity: 0.98;
    }

    .signin {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .signin a {
      color: var(--text);
      font-weight: 700;
    }

    .footer {
      margin-top: 22px;
      color: rgba(255,255,255,0.32);
      font-size: 0.8rem;
      line-height: 1.2;
    }

    @media (max-height: 760px) {
      .panel {
        padding-top: 22px;
        padding-bottom: 20px;
      }

      .brand {
        margin-bottom: 18px;
      }

      .logo-wrap {
        width: min(48vw, 168px);
        margin-bottom: 18px;
      }

      .headline {
        font-size: clamp(2.3rem, 10vw, 3.6rem);
        margin-bottom: 14px;
      }

      .subhead {
        font-size: 0.98rem;
        margin-bottom: 16px;
      }

      .engines {
        font-size: 0.9rem;
        margin-bottom: 22px;
      }

      .cta {
        padding: 18px 16px;
      }

      .footer {
        margin-top: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="brand">misfit ai</div>

      <div class="logo-wrap">
        <img src="neon-skull-rose.png" alt="Misfit AI logo" class="logo" />
      </div>

      <h1 class="headline">
        <span class="line">Autonomous</span>
        <span class="line accent">Revenue Engine</span>
      </h1>

      <p class="subhead">
        From digital business card to enterprise SaaS, Misfit AI runs follow-up, books appointments, and keeps revenue moving automatically.
      </p>

      <div class="engines">
        AI Twin · Lead Revival Engine · Affiliate Engine
      </div>

      <a href="https://misfit-ai-v2.base44.app" class="cta">
        Launch My AI Empire
      </a>

      <div class="signin">
        Already have an account?
        <a href="https://misfit-ai-v2.base44.app">Sign in</a>
      </div>

      <div class="footer">© Misfit Mediahouse</div>
    </section>
  </main>
</body>
</html>
