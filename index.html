<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Misfit AI</title>
  <meta
    name="description"
    content="Misfit AI is autonomous revenue software for operators who want faster follow-up, revived leads, and cleaner execution."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #060606;
      --text: #f5f5f5;
      --muted: #9b9b9b;
      --line: rgba(255,255,255,0.08);
      --accent: #20d7c7;
      --accent-2: #16bfb0;
      --button-text: #041010;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #060606;
      color: var(--text);
      font-family: "Inter", Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: 100%;
      max-width: 420px;
      min-height: calc(100dvh - 48px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding-top: 6px;
    }

    .topbar img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 10px;
    }

    .brand {
      font-size: 1.95rem;
      font-weight: 900;
      letter-spacing: -0.07em;
      text-transform: lowercase;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px 0;
    }

    .logo {
      width: min(72vw, 240px);
      margin-bottom: 28px;
      object-fit: contain;
    }

    h1 {
      font-size: clamp(2.4rem, 9vw, 4.2rem);
      line-height: 0.94;
      letter-spacing: -0.08em;
      font-weight: 900;
      max-width: 360px;
      margin-bottom: 18px;
    }

    .accent {
      color: var(--accent);
    }

    .subhead {
      max-width: 335px;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.65;
      font-weight: 500;
      margin-bottom: 28px;
    }

    .cta {
      width: 100%;
      max-width: 360px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 18px 20px;
      border-radius: 16px;
      background: linear-gradient(90deg, var(--accent-2) 0%, #35d6e3 100%);
      color: var(--button-text);
      font-size: 1.08rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .cta:hover,
    .cta:active {
      transform: translateY(-1px);
      opacity: 0.98;
    }

    .signin {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .signin a {
      color: var(--text);
      font-weight: 700;
    }

    .signin a:hover {
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      color: rgba(255,255,255,0.34);
      font-size: 0.78rem;
      padding-bottom: 6px;
    }

    @media (max-height: 760px) {
      .logo {
        width: min(56vw, 180px);
        margin-bottom: 22px;
      }

      h1 {
        font-size: clamp(2rem, 8vw, 3.2rem);
        max-width: 320px;
      }

      .subhead {
        font-size: 0.96rem;
        margin-bottom: 22px;
      }

      .cta {
        padding: 16px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <img src="neon-skull-rose.png" alt="Misfit AI logo" />
      <div class="brand">misfit ai</div>
    </header>

    <section class="hero">
      <img src="neon-skull-rose.png" alt="Misfit AI skull logo" class="logo" />

      <h1>
        Autonomous <span class="accent">Revenue</span><br />
        For Operators
      </h1>

      <p class="subhead">
        Revive dead leads, automate follow-up, and keep deals moving without living inside a bloated CRM.
      </p>

      <a href="https://misfit-ai-v2.base44.app/Pricing" class="cta">
        Launch My AI Empire
      </a>

      <div class="signin">
        Already have an account?
        <a href="https://misfit-ai-v2.base44.app">Sign in</a>
      </div>
    </section>

    <footer class="footer">
      © Misfit Mediahouse
    </footer>
  </main>
</body>
</html>
