<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Launch Your AI Empire</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .wrap {
      width: 100%;
      max-width: 460px;
      padding: 28px 22px 36px;
    }

    h1 {
      font-size: 28px;
      line-height: 1.15;
      margin: 0 0 10px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .highlight {
      color: #18c8ff;
      text-shadow: 0 0 14px rgba(24, 200, 255, 0.3);
    }

    p {
      color: #aaa;
      font-size: 16px;
      line-height: 1.5;
      margin: 0 0 22px;
    }

    .chat-box {
      background: #111;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      text-align: left;
      font-size: 14px;
      line-height: 1.5;
      min-height: 110px;
      box-shadow: 0 10px 30px rgba(255,255,255,0.03);
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #1d1d1f;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    input::placeholder {
      color: #777;
    }

    .send-btn {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: #d4a017;
      color: #000;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }

    .cta {
      margin-top: 6px;
      display: none;
    }

    .cta a {
      display: block;
      width: 100%;
      padding: 16px 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, #18c8ff, #00ffa3);
      color: #000;
      font-weight: 800;
      font-size: 18px;
      text-decoration: none;
      box-shadow: 0 12px 30px rgba(24, 200, 255, 0.18);
    }

    .sub {
      margin-top: 12px;
      font-size: 13px;
      color: #8b8b92;
    }

    .supporting {
      margin-top: 18px;
      font-size: 13px;
      color: #6f6f76;
      line-height: 1.6;
    }

    @media (max-width: 420px) {
      .wrap {
        padding: 24px 18px 30px;
      }

      h1 {
        font-size: 26px;
      }

      .input-row {
        gap: 8px;
      }

      .send-btn {
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Launch Your <span class="highlight">AI Empire</span></h1>
    <p>Try your AI Twin. Type anything.</p>

    <div class="chat-box" id="chat">
      👋 I’m your AI Twin. Ask me how I can grow your business.
    </div>

    <div class="input-row">
      <input id="input" type="text" placeholder="Type a message..." />
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <div class="cta" id="cta">
      <a href="/app">Launch My AI Empire →</a>
      <div class="sub">14-day free trial · No credit card</div>
    </div>

    <div class="supporting">
      This is a public soft-entry experience. No hard login wall on first interaction.
    </div>
  </main>

  <script>
    function sendMessage() {
      const input = document.getElementById("input");
      const chat = document.getElementById("chat");
      const cta = document.getElementById("cta");
      const value = input.value.trim();

      if (!value) return;

      chat.innerHTML += "<br><br>🧠: " + escapeHtml(value);

      setTimeout(() => {
        chat.innerHTML += "<br><br>⚡ AI Twin: I can revive dead leads, follow up instantly, and book appointments automatically.";
        cta.style.display = "block";
      }, 700);

      input.value = "";
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
