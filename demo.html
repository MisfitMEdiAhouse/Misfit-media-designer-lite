<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Launch Your AI Empire</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .wrap {
      max-width: 420px;
      padding: 24px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .highlight {
      color: #18c8ff;
    }

    p {
      color: #aaa;
      font-size: 15px;
      margin-bottom: 20px;
    }

    .chat-box {
      background: #111;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: left;
      font-size: 14px;
      min-height: 80px;
    }

    .input {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #222;
      color: #fff;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #d4a017;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    .cta {
      margin-top: 20px;
      display: none;
    }

    .cta a {
      display: block;
      padding: 14px;
      border-radius: 12px;
      background: linear-gradient(90deg,#18c8ff,#00ffa3);
      color: #000;
      font-weight: bold;
      text-decoration: none;
    }

    .sub {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
    }

  </style>
</head>

<body>

  <div class="wrap">
    <h1>Launch Your <span class="highlight">AI Empire</span></h1>

    <p>Try your AI Twin. Type anything.</p>

    <div class="chat-box" id="chat">
      👋 I’m your AI Twin. Ask me how I can grow your business.
    </div>

    <div class="input">
      <input id="input" placeholder="Type a message..." />
      <button onclick="send()">Send</button>
    </div>

    <div class="cta" id="cta">
      <a href="https://app.misfitmediahouse.com">
        Launch My AI Empire →
      </a>
      <div class="sub">
        14-day free trial · No credit card
      </div>
    </div>
  </div>

  <script>
    function send() {
      const input = document.getElementById('input');
      const chat = document.getElementById('chat');
      const cta = document.getElementById('cta');

      if (!input.value) return;

      chat.innerHTML += "<br><br>🧠: " + input.value;

      setTimeout(() => {
        chat.innerHTML += "<br><br>⚡ AI Twin: I can revive dead leads, follow up instantly, and book appointments automatically.";

        cta.style.display = "block";
      }, 800);

      input.value = "";
    }
  </script>

</body>
</html>
